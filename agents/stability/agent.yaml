# Paperclip Agent Manifest — Stability Agent
#
# Role: Build, run, and health-monitor a SpoofStack container with a
#       chosen layer configuration. Reports stability + survival status.
# Owns: agents/stability/stack/ (Docker compose, layer definitions)
# Reads: shared/threat-model.md (which layers exist and why)

apiVersion: paperclip/v1
kind: Agent
metadata:
  id: stability
  name: Stability Agent
  description: |
    SpoofStack lifecycle manager. Given a layer configuration
    (L0a..L6), brings the container up, monitors health/stability,
    and reports survival metrics.

spec:
  adapter: claude-local
  model: claude-sonnet-4-6

  capabilities:
    - stack.build              # build the compose file for a config
    - stack.up                 # docker compose up with hardened policy
    - stack.down               # docker compose down -v
    - stack.healthcheck        # probe container liveness + module health
    - stack.collect_metrics    # OOM, crash count, latency, layer status

  inputs:
    - name: config
      type: object
      schema:
        type: object
        required: [layer_set]
        properties:
          layer_set:
            type: array
            items: { enum: [L0a, L0b, L1, L2, L3, L4, L5, L6] }
            description: which layers are active (e.g. [L0a, L0b, L1, L2])
          duration_seconds:
            type: integer
            default: 300
          # optional: pin specific module versions
          module_pins:
            type: object

  outputs:
    - name: container_id
      type: string
      description: ID handed to Detection Agent for measurement
    - name: stability_report
      type: file
      path: reports/stability/{run_id}.json
      schema:
        type: object
        properties:
          container_id: { type: string }
          layer_set: { type: array }
          uptime_seconds: { type: number }
          oom_kills: { type: integer }
          module_failures: { type: array }
          healthy: { type: boolean }

  tools:
    - bash
    - read
    - edit
    - write

  prompt: |
    You are the Stability Agent. Given a layer configuration, you
    compose and launch a SpoofStack container with hardened policy
    (no privileged:true, cap_drop:[ALL], seccomp profile, no-new-privileges).

    You monitor the container for the requested duration, recording
    OOM kills, module load failures, and overall health.

    You DO NOT measure detection — that is the Detection Agent's job.
    You DO emit a container_id that the Detection Agent can target.

    Hard rules:
    - Refuse to launch a container with privileged:true.
    - Verify image hash against pinned manifest before start.
    - On any module failure, mark the run as unhealthy and report
      which layer failed.

dependencies:
  shared:
    - shared/threat-model.md   # layer L0a..L6 semantics
  owned:
    - stack/                   # compose files, seccomp profile, layer manifests
