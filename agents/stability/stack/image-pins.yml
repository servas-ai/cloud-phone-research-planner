# -----------------------------------------------------------------------------
# Verification contract (consumed by container_lifecycle.py preflight)
# -----------------------------------------------------------------------------
verification:
  required_before_compose_up:
    - id: "image-digest-match"
      check: >
        docker manifest inspect {repository}:{tag_label}
        | jq -r '.manifests[]|select(.platform.architecture=="{host_arch}").digest'
        must equal redroid_12_64only.digest_{host_arch}
      on_failure: "exit 78 + file pin-update mutation"
    - id: "module-commit-match"
      check: "for each modules[].pinned_commit: git ls-remote {source} HEAD == pinned_commit"
      on_failure: "exit 78 + file pin-update mutation"
      skip_when_offline_with_cached_clone: true
    - id: "local-module-file-sha256-match"
      check: "for each modules[].file_sha256: sha256sum {file} == pinned hash"
      on_failure: "exit 78 + comment cpuinfo-overlay tampering"
  reporter:
    - "container_lifecycle.py --dry-run prints each verification id with PASS/FAIL"
    - "reports/stability/{run_id}.json records {verification: [...]} block"
