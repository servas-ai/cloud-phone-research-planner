# fingerprints against the in-tree files immediately before compose-up.
modules:

  # ---------- L0b root (Magisk) ----------
  - id: magisk
    layer: L0b
    pinned_version: "v27.2"
    source: "github.com/topjohnwu/Magisk"
    # NOTE: shared/spoofstack-modules.md baseline pins v27.2. As of 2026-05-16,
    # the upstream topjohnwu/Magisk repo's nearest neighbour tags are v27.0,
    # v28.0, v28.1 (no v27.2). Magisk v27.2 is distributed via a downstream
    # rebuild / mirror (commonly fingerprinted by the canonical APK SHA256
    # listed in the baseline doc). At runtime container_lifecycle.py MUST
    # verify the APK SHA against `artifact_sha256` below; if absent, the
    # lifecycle aborts with a clear "pin not resolved" message — NOT silent
    # fallback to v27.0. Re-pinning is a board decision (file a pin-update
    # mutation), NOT a Stability local-override.
    artifact: "Magisk-v27.2.apk"
    artifact_sha256: "pending-runtime-verification"
    config:
      built_in_zygisk: false       # ReZygisk overrides
      enforce_denylist: false      # Shamiko overrides
    cross_ref:
      spoofstack_modules_md: "L0b row 'Magisk v27.2 (built-in Zygisk OFF)'"

