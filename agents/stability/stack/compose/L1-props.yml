# L1-props.yml — Layer 1 (Props/Files Masking) module registration
#
# Defines the Magisk modules that are deployed at the L1 layer to mask
# build-prop and /proc-level artefacts. Modules are applied in ORDER (last wins
# for any mount-bind conflict).
#
# Each entry maps directly to a directory under:
#   agents/stability/stack/modules/<id>/
# which must contain a valid module.prop and, optionally, a service.sh.
#
# This file is consumed by the Stability Agent sandbox-build pipeline.
# DO NOT add L0a (ReDroid baseline) entries here — those are in Stability's lane.

schema_version: "1"
layer: L1

# Modules ordered so that later entries' bind-mounts win over earlier entries.
modules:

  - id: DeviceSpoofLab-Magisk
    source: github.com/yubunus/DeviceSpoofLab-Magisk
    pinned_version: "latest-main"  # see shared/spoofstack-modules.md §Verified baseline
    purpose: "build.prop filesystem patches (#4, #7, #13, #28)"
    enabled: true

  - id: DeviceSpoofLab-Hooks
    source: github.com/yubunus/DeviceSpoofLab-Hooks
    pinned_version: "latest-main"
    purpose: "API-level property hooks 126+ props (#1, #9, #27)"
    enabled: true

  - id: cpuinfo-overlay
    source: "local:agents/stability/stack/modules/cpuinfo-overlay"
    pinned_version: "0.1.0"
    purpose: >
      Bind-mounts a synthesised Cortex-A78/Tensor-G2 /proc/cpuinfo over the
      host-exposed file to mask x86 bogomips and serial leaks.
      Targets probe kernel.cpuinfo_bogomips (CLO-27 / proposal 019e2f12).
    enabled: true
    # Must come AFTER DeviceSpoofLab-Hooks so its bind-mount takes precedence
    # for /proc/cpuinfo specifically.

target_profile: "Pixel 7 (panther) — Android 14 — security_patch=2024-08-05"
