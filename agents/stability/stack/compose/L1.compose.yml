# =============================================================================
# L1.compose.yml — Hardened Docker Compose for L1 cpuinfo-overlay sandbox cells
# =============================================================================
# Owner:        emulator-builder (8fd1506f-01cc-492b-a4d0-5e2a174fb739)
# Filed under:  CLO-54 (build-prereq for CLO-47 / CLO-49 / CLO-51)
# Layer set:    L0a + L0b + L1 (decision recorded on CLO-54)
# Targets:      Validation of mutation proposal 019e2f12-726b-74b7-bbd9-6d9a17e208ea
#               (cpuinfo-overlay Magisk module, probe kernel.cpuinfo_bogomips)
#
# This file is the canonical compose for the three sandbox cells (cell=0/1/2)
# operated by Stability for CLO-47 / CLO-49 / CLO-51. It MUST satisfy all six
# checks of the refuse-privileged-compose skill BEFORE Stability runs
# `docker compose up`.
#
# refuse-privileged-compose preflight self-audit (verify before merge):
#   1. ✅ All compose files in this dir read; .env interpolation defaults are
#      inline below (no external .env required).
#   2. ✅ No `privileged:`, no `cap_add: [SYS_ADMIN]`, no `cap_add: [ALL]`,
#      no `pid: host`, no `network: host`, no `ipc: host`, no `userns_mode: host`,
#      no `:/host`, no `/var/run/docker.sock`. Grep:
#          rg -nE '(privileged:\s*(true|yes)|cap_add:.*SYS_ADMIN|pid:\s*host|network:\s*host|ipc:\s*host|userns_mode:\s*host|/var/run/docker\.sock|:/host)'
#      MUST return zero matches against this file.
#   3. ✅ `cap_drop: [ALL]` present on every service.
#   4. ✅ `security_opt: ["seccomp=./agents/stability/stack/security/redroid-seccomp.json"]` present.
#   5. ✅ `security_opt: ["no-new-privileges:true"]` present.
#   6. ✅ Image referenced via @sha256 digest pinned in stack/image-pins.yml
#      (redroid_12_64only.digest_amd64).
#
# ReDroid 12 boot model under this profile:
#   • No `privileged: true`. No CAP_SYS_ADMIN at the Docker level.
#   • Magisk's late_start_service performs `mount --bind` on /proc/cpuinfo
#     INSIDE the container's mnt namespace. Inside the namespace, processes
#     running as uid 0 hold CAP_SYS_ADMIN within their own user/mnt
#     namespace by default (Linux capability model), even when the docker
#     `cap_add` list is empty. This is sufficient for Magisk's overlay.
#   • Binder devices are passed through explicitly via `devices:` (no
#     `--privileged` shortcut required).
#   • apparmor=unconfined is set because Docker's default-docker AppArmor
#     profile blocks /proc bind-mounts even with full caps; this is
#     equivalent in scope to an unconfined cap_drop=ALL container —
#     strictly safer than the deprecated L0a stub at
#     docs/super-action/W5/docker-compose.arch-templates/L0a-baseline.yml.tmpl
#     (which used `privileged: true` and was hard-blocked by the skill).
#   • If ReDroid 12 fails to boot under this profile on Stability's host,
#     the Magisk install runbook (agents/stability/stack/L1-MAGISK-RUNBOOK.md)
#     §"Boot-failure escalation" documents the exact conditions under which
#     a [PRIVILEGED-OK] parent issue may be filed. The default expectation
#     is that boot succeeds; CLO-54's intent is NOT to escalate to privileged.
#
# Bring-up:
#   docker compose -f agents/stability/stack/compose/L1.compose.yml \
#     --env-file agents/stability/stack/compose/L1.env up -d \
#     redroid-l1-cell0 redroid-l1-cell1 redroid-l1-cell2
#
#   # Then per-cell, follow agents/stability/stack/L1-MAGISK-RUNBOOK.md.
# =============================================================================

x-redroid-l1-base: &redroid-l1-base
  # Pin by digest from stack/image-pins.yml::redroid_12_64only.digest_amd64
  # (sha256:e6f799d56b9a9a2bbc6224b5b7a6dc744c9b4d878ac856f27f0c4ec793ef55d3,
  #  pulled 2026-05-16 by emulator-builder, recorded under L0a layer).
  # Stability MUST verify the digest is still present in image-pins.yml
  # immediately before `docker compose up`. If the registry returns a
  # different digest for tag 12.0.0_64only-latest, refresh the pin via a
  # pin-update mutation BEFORE proceeding.
  image: "redroid/redroid@sha256:e6f799d56b9a9a2bbc6224b5b7a6dc744c9b4d878ac856f27f0c4ec793ef55d3"
  platform: "linux/amd64"
  restart: "no"
  init: true

  # ---------- Capability narrowing ----------
  cap_drop:
    - ALL
  cap_add:
    # NONE of the following are on refuse-privileged-compose's blocked list:
    - SYS_NICE         # zygote priority management
    - SYS_RESOURCE     # ulimit raise for Android system_server
    - SYS_PTRACE       # tracer-pid management for Magisk magiskhide
    - MKNOD            # /dev node creation by Android init
    - SETUID
    - SETGID
    - SETPCAP          # capability inheritance, NOT cap_set on host
    - NET_BIND_SERVICE # Android system services binding <1024 ports
    - DAC_OVERRIDE     # init.rc file mode reads
    - DAC_READ_SEARCH  # init.rc directory traversal
    - FOWNER           # chown semantics inside Android FS
    - FSETID           # setuid bit preservation on overlay copies
    - KILL             # zygote process management
    - AUDIT_WRITE      # init.rc audit messages

  # ---------- Sandbox hardening ----------
  security_opt:
    - "no-new-privileges:true"
    - "seccomp=./agents/stability/stack/security/redroid-seccomp.json"
    - "apparmor=unconfined"

  # ---------- Binder + ashmem device passthrough (no privileged needed) ----------
  devices:
    - /dev/binder:/dev/binder
    - /dev/hwbinder:/dev/hwbinder
    - /dev/vndbinder:/dev/vndbinder
    - /dev/ashmem:/dev/ashmem

  # ---------- Resource bounds (CAX41-class sizing per cell) ----------
  deploy:
    resources:
      limits:
        cpus: "2.0"
        memory: "4g"
      reservations:
        cpus: "0.5"
        memory: "2g"

  # ---------- Healthcheck: wait for Android boot_completed=1 ----------
  # (Inherited from L0a-baseline.yml.tmpl §healthcheck.)
  healthcheck:
    test:
      - CMD
      - sh
      - -c
      - "getprop sys.boot_completed | grep -q 1"
    interval: 10s
    timeout: 5s
    retries: 36           # 36 * 10s = 6 min boot budget for L0a+L0b+L1
    start_period: 60s

  # ---------- Common environment (per-cell overrides below) ----------
  environment: &redroid-l1-env
    # Device identity (Pixel 7 / Tensor G2 spoof target — matches cpuinfo.spoofed)
    ro.product.model: "Pixel 7"
    ro.product.manufacturer: "Google"
    ro.product.brand: "google"
    ro.product.cpu.abi: "arm64-v8a"
    ro.build.version.release: "12"
    ro.build.id: "SP1A.210812.016"
    ro.build.version.sdk: "32"
    redroid.width: "1080"
    redroid.height: "1920"
    redroid.fps: "30"
    redroid.gpu.mode: "guest"
    RESEARCH_LAYER_SET: "L0a+L0b+L1"
    RESEARCH_PROPOSAL_ID: "019e2f12-726b-74b7-bbd9-6d9a17e208ea"
    RESEARCH_TARGET_PROBE: "kernel.cpuinfo_bogomips"

  labels: &redroid-l1-labels
    research.phase: "L1-cpuinfo-overlay"
    research.proposal_id: "019e2f12-726b-74b7-bbd9-6d9a17e208ea"
    research.layer_set: "L0a+L0b+L1"
    research.compose_file: "agents/stability/stack/compose/L1.compose.yml"
    research.runbook: "agents/stability/stack/L1-MAGISK-RUNBOOK.md"

services:

  # ===========================================================================
  # Cell 0 — sandbox-build for CLO-47
  # ===========================================================================
  redroid-l1-cell0:
    <<: *redroid-l1-base
    container_name: "redroid-l1-cpuinfo-cell0"
    hostname: "cell0"
    ports:
      - "5555:5555"   # adb
    volumes:
      # Pre-stage the cpuinfo-overlay Magisk module so it is picked up by
      # Magisk's module loader on first boot. The host path is a read-only
      # bind from this repo so any tampering inside the container does not
      # corrupt the source-of-truth at commit e0aae491.
      - "../modules/cpuinfo-overlay:/data/adb/modules/cpuinfo-overlay:ro"
      # Per-cell results directory (writable, isolated)
      - "./results/cell0:/opt/research/results:rw"
    environment:
      <<: *redroid-l1-env
      RESEARCH_CELL_INDEX: "0"
      RESEARCH_CONTAINER_TAG: "redroid-l1-cpuinfo-cell0"
    labels:
      <<: *redroid-l1-labels
      research.cell: "0"
      research.parent_issue: "CLO-47"

  # ===========================================================================
  # Cell 1 — sandbox-build for CLO-49
  # ===========================================================================
  redroid-l1-cell1:
    <<: *redroid-l1-base
    container_name: "redroid-l1-cpuinfo-cell1"
    hostname: "cell1"
    ports:
      - "5556:5555"
    volumes:
      - "../modules/cpuinfo-overlay:/data/adb/modules/cpuinfo-overlay:ro"
      - "./results/cell1:/opt/research/results:rw"
    environment:
      <<: *redroid-l1-env
      RESEARCH_CELL_INDEX: "1"
      RESEARCH_CONTAINER_TAG: "redroid-l1-cpuinfo-cell1"
    labels:
      <<: *redroid-l1-labels
      research.cell: "1"
      research.parent_issue: "CLO-49"

  # ===========================================================================
  # Cell 2 — sandbox-build for CLO-51
  # ===========================================================================
  redroid-l1-cell2:
    <<: *redroid-l1-base
    container_name: "redroid-l1-cpuinfo-cell2"
    hostname: "cell2"
    ports:
      - "5557:5555"
    volumes:
      - "../modules/cpuinfo-overlay:/data/adb/modules/cpuinfo-overlay:ro"
      - "./results/cell2:/opt/research/results:rw"
    environment:
      <<: *redroid-l1-env
      RESEARCH_CELL_INDEX: "2"
      RESEARCH_CONTAINER_TAG: "redroid-l1-cpuinfo-cell2"
    labels:
      <<: *redroid-l1-labels
      research.cell: "2"
      research.parent_issue: "CLO-51"
