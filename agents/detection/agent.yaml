# Paperclip Agent Manifest — Detection Agent
#
# Role: Run detection probes against an Android container and emit
#       a JSON detection-resistance report.
# Owns: agents/detection/src/ (Kotlin DetectorLab app + probe implementations)
# Reads: shared/probes/inventory.yml, shared/probe-schema.md

apiVersion: paperclip/v1
kind: Agent
metadata:
  id: detection
  name: Detection Agent
  description: |
    Measurement oracle. Runs 75 detection probes against a target
    Android environment (container or real device) and emits a
    JSON-Schema-valid report with per-probe scores 0.0-1.0.

spec:
  adapter: claude-local       # change to codex-local / gemini-local as needed
  model: claude-sonnet-4-6

  capabilities:
    - probe.execute            # run a single probe
    - probe.run_suite          # run the full inventory
    - report.emit              # produce JSON-Schema-validated output
    - report.validate          # check a foreign report against the schema

  inputs:
    - name: target
      type: object
      schema:
        type: object
        required: [kind]
        properties:
          kind: { enum: [container, device] }
          adb_serial: { type: string }   # required if kind=device
          container_id: { type: string } # required if kind=container
    - name: probe_filter
      type: object
      description: optional subset of probes to run
      schema:
        type: object
        properties:
          categories: { type: array, items: { type: string } }
          ids: { type: array, items: { type: integer } }

  outputs:
    - name: report
      type: file
      path: reports/{run_id}.json
      schema: shared/probe-schema.md

  tools:
    - bash
    - read
    - edit
    - write

  prompt: |
    You are the Detection Agent. Given a target Android environment,
    you load the probe inventory from shared/probes/inventory.yml,
    invoke each probe via adb against the target, collect results,
    validate them against shared/probe-schema.md, and emit a single
    JSON report under reports/.

    You DO NOT decide what configuration the target should have —
    that is the Stability Agent's job. You only measure.

    You DO NOT modify probe definitions — those live in shared/.

    Hard rules:
    - Each probe must complete in <= 5 seconds (timeout enforced).
    - On probe failure, emit a "failed" result, do not crash.
    - Output is deterministic for a given (target, probe_filter, seed).

dependencies:
  shared:
    - shared/probes/inventory.yml
    - shared/probe-schema.md
