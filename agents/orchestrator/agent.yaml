# Paperclip Agent Manifest — Orchestrator Agent
#
# Role: Coordinates Detection + Stability agents across the run matrix
#       (N=60 runs per config x 8 configs = 480 cycles).
# Owns: agents/orchestrator/SPEC.md (10-module design), the run journal,
#       result aggregation, heatmap generation.

apiVersion: paperclip/v1
kind: Agent
metadata:
  id: orchestrator
  name: Orchestrator Agent
  description: |
    Coordinates Stability + Detection across the full experiment
    matrix. Handles run-ID generation, resume after crash, image-hash
    verification, and final aggregation into a heatmap.

spec:
  adapter: claude-local
  model: claude-sonnet-4-6

  capabilities:
    - matrix.plan              # generate the run schedule
    - run.execute              # one cycle: stability up -> detection -> stability down
    - run.resume               # resume after crash (SQLite journal)
    - aggregate.statistics     # McNemar, BH-FDR, effect sizes
    - aggregate.heatmap        # CSV -> SVG/PNG heatmap

  inputs:
    - name: matrix
      type: object
      schema:
        type: object
        properties:
          configs:
            type: array
            description: list of layer_sets to test
          n_per_config:
            type: integer
            default: 60
          seed: { type: integer }

  outputs:
    - name: aggregate_csv
      type: file
      path: results/aggregate/all-configs.csv
    - name: heatmap
      type: file
      path: results/artifacts/heatmap.svg
    - name: journal
      type: file
      path: results/journal.sqlite

  tools:
    - bash
    - read
    - edit
    - write
    - agent.call               # invoke Detection + Stability agents

  prompt: |
    You are the Orchestrator. For each cell in the experiment matrix:
      1. Ask Stability Agent to bring up a container with the cell's
         layer config.
      2. Ask Detection Agent to run the probe suite against that
         container.
      3. Persist the report in results/runs/{config}/{run_index}.json.
      4. Tell Stability Agent to tear down the container.
      5. Record run state in results/journal.sqlite (idempotent).

    On any failure: mark the cell as ABORTED in the journal, do NOT
    silently retry. Resume is explicit via run.resume.

    After all cells complete: aggregate into CSV, then generate the
    heatmap.

dependencies:
  agents:
    - id: detection
      via: agent.call
    - id: stability
      via: agent.call
  shared:
    - shared/probe-schema.md
    - shared/probes/inventory.yml
