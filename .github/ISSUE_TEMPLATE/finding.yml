name: New Finding
description: Propose a new validation finding for the academic plan.
title: "[F-NEW] "
labels: ["finding", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose a new finding for the next validation round.
        AI agents: read AGENTS.md and SKILL.md first; the workflow in prompts/01-extend-finding.md applies.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One paragraph describing the finding.
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options: [critical (blocking), high, medium, low, trace]
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - probe-coverage
        - statistical-rigor
        - reproducibility
        - threat-model
        - tooling-orchestrator
        - operational
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Cite the source (paper, repo, plan-file:line). No "I think" without a reference.
    validations:
      required: true
  - type: textarea
    id: proposed_correction
    attributes:
      label: Proposed Correction
      description: Concrete file path + diff sketch.
    validations:
      required: true
  - type: checkboxes
    id: gates
    attributes:
      label: Gates
      options:
        - label: I have read AGENTS.md
