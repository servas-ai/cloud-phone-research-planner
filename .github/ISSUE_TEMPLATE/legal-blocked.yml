name: Legal-Gate Encounter
description: You hit a Legal-Gate finding (F21 / F22 / F23 or analogous) — this issue tracks the human escalation.
title: "[LEGAL-GATE] "
labels: ["legal-gate", "blocked", "needs-counsel"]
body:
  - type: markdown
    attributes:
      value: |
        🛑 This issue is intended for human escalation only.
        AI agents: do not draft "what the answer might be" — that risks anchoring legal opinion.
        Open the issue, summarise the encounter, and stop.
  - type: textarea
    id: encounter
    attributes:
      label: Where you hit the gate
      description: File path / section / proposed action that triggered the gate.
    validations:
      required: true
  - type: dropdown
    id: gate_type
    attributes:
      label: Which gate
      options:
        - F21 — Privileged Docker / Host-Root-Escape
        - F22 — Keybox provenance §259 StGB
        - F23 — Reproducibility-pack §202c
        - EU 2021/821 Dual-Use
        - DSGVO Art. 4(1) personenbezogene Daten
        - Other (specify)
    validations:
      required: true
  - type: textarea
    id: minimal_facts
    attributes:
      label: Minimal facts needed by counsel
      description: Plain-language summary of the technical situation and the exact decision needed. No code samples, no hypothetical legal interpretation.
    validations:
      required: true
